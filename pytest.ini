[pytest]
pythonpath = . backend
testpaths = tests
# Strict settings for Quality assurance
addopts = 
    --strict-markers
    --strict-config
#    --cov=backend 
#    --cov-fail-under=100
    -ra
    -q

# Treat warnings as errors
filterwarnings =
    error
    ignore::DeprecationWarning:passlib.*:

markers =
    unit: Testes unitários isolados
    integration: Testes de integração (DB/API)
    e2e: Testes ponta a ponta (E2E com Playwright)
    smoke: Testes de smoke — execução rápida em CI/CD
    critical: Fluxos críticos integrados
    slow: Testes que demoram mais (fluxos completos)
